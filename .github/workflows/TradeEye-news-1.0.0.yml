name: RSS News Digest Automation

on:
  schedule:
    # Weekdays 07:30 Asia/Shanghai == 23:30 UTC (previous UTC day).
    - cron: "30 23 * * 0-4"
  workflow_dispatch:

jobs:
  trade_eye_news_job:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      NEWS_RSS_FEEDS: ${{ vars.NEWS_RSS_FEEDS || '' }}
      NEWS_RSS_FEEDS_FILE: ${{ vars.NEWS_RSS_FEEDS_FILE || 'tradeeye/resources/news_feeds.txt' }}
      NEWS_LOOKBACK_HOURS: ${{ vars.NEWS_LOOKBACK_HOURS || '24' }}
      NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS || '12' }}
      NEWS_INCLUDE_KEYWORDS: ${{ vars.NEWS_INCLUDE_KEYWORDS || '电力,电网,电价,输电,配电,储能,火电,水电,核电,风电,光伏,能源,新能源,虚拟电厂,电改,电力市场,源网荷储' }}
      NEWS_EXCLUDE_KEYWORDS: ${{ vars.NEWS_EXCLUDE_KEYWORDS || '广告,抽奖,直播,招聘,活动报名,公告,回顾,视频,播客' }}
      NEWS_PUSH_WHEN_EMPTY: ${{ vars.NEWS_PUSH_WHEN_EMPTY || 'false' }}
      NEWS_TEMPLATE_FILE: ${{ vars.NEWS_TEMPLATE_FILE || 'tradeeye/resources/news_template.txt' }}
      DEBUG_MODE: "false"

    steps:
      - name: Smart random delay for scheduled runs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled run: applying random delay..."
            sleep $(( (RANDOM % 30) * 60 ))
          else
            echo "Manual dispatch: skip delay and run now."
          fi

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run daily RSS news digest (NEWS)
        run: python news_main.py
